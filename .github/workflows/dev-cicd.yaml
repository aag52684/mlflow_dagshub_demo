name: Dev CI/CD Pipeline   # Display name of the workflow

on:
  push:
    branches:
      - main
    paths:
      #- 'deployment/triggers/dev-trigger.txt'
      - 'deployment/versions/dev-version.txt'
      - 'helm/**'
      - '.github/workflows/dev-cicd.yaml'
  workflow_dispatch:

jobs:
  validate-dev:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Validate Helm chart with dev values
        run: helm template first-experiment ./helm/first-experiment -f ./helm/first-experiment/values-dev.yaml

  deploy-dev:
    runs-on: ubuntu-latest
    needs: validate-dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show dev version
        run: cat deployment/versions/dev-version.txt

      - name: Dev deployment stage placeholder
        run: echo "Dev deployment will be connected after trigger-based flow is validated"