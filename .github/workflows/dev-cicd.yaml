name: Dev CI/CD Pipeline   # Dev pipeline for controlled build, push, and deployment flow

on:
  push:
    branches:
      - main               # Run automatically after changes are merged into the main branch
    paths:
      - 'deployment/versions/dev-version.txt'   # Trigger when the development version file changes
      - 'helm/**'          # Trigger when Helm chart files are updated
      - 'Dockerfile'       # Trigger when the container build definition changes
      - '.github/workflows/dev-cicd.yaml'       # Trigger when this workflow file is updated
  workflow_dispatch:       # Allow controlled manual execution from GitHub Actions

jobs:
  ci-dev:
    runs-on: ubuntu-latest   # Standard GitHub-hosted runner for CI execution

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4   # Pull the latest repository code for pipeline execution

      - name: Read development version
        run: echo "IMAGE_TAG=$(cat deployment/versions/dev-version.txt)" >> $GITHUB_ENV
        # Load the active development version for image tagging and downstream steps

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
        # Prepare the runtime required for application build and validation activities

      - name: Dependency installation placeholder
        run: echo "Install application dependencies here"
        # Reserved for dependency installation as part of the CI stage

      - name: Application build placeholder
        run: echo "Run application build step here"
        # Reserved for application build execution

      - name: Test execution placeholder
        run: echo "Run application test step here"
        # Reserved for unit, integration, or functional test execution

      - name: Set up Helm
        uses: azure/setup-helm@v4
        # Prepare Helm for chart validation before deployment packaging

      - name: Validate Helm chart with dev values
        run: helm template first-experiment ./helm/first-experiment -f ./helm/first-experiment/values-dev.yaml
        # Validate Helm rendering against the development environment configuration

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_TOKEN }}
        # Authenticate to Docker Hub using repository secrets

      - name: Build Docker image
        run: docker build -t ${{ secrets.REGISTRY_USERNAME }}/first-experiment-model:${IMAGE_TAG} .
        # Build the application image using the development version as the image tag

      - name: Push Docker image
        run: docker push ${{ secrets.REGISTRY_USERNAME }}/first-experiment-model:${IMAGE_TAG}
        # Push the versioned image to the target Docker Hub repository

  cd-dev:
    runs-on: ubuntu-latest   # Runner for the deployment stage
    needs: ci-dev            # Continue only after the CI stage completes successfully

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        # Pull the latest repository code for deployment execution

      - name: Read development version
        run: echo "IMAGE_TAG=$(cat deployment/versions/dev-version.txt)" >> $GITHUB_ENV
        # Load the same development version for deployment

      - name: Show deployment version
        run: cat deployment/versions/dev-version.txt
        # Confirm the version selected for development deployment

      - name: Set up local Kubernetes cluster
        uses: helm/kind-action@v1
        # Create a temporary no-cost Kubernetes cluster inside the GitHub Actions runner

      - name: Verify local Kubernetes cluster
        run: |
          kubectl cluster-info
          kubectl get nodes
        # Confirm that the local Kubernetes cluster is ready for deployment

      - name: Set up Helm
        uses: azure/setup-helm@v4
        # Prepare Helm for Kubernetes deployment

      - name: Helm deployment to local Kubernetes
        run: |
          helm upgrade --install first-experiment ./helm/first-experiment \
            -f ./helm/first-experiment/values-dev.yaml \
            --set image.repository=${{ secrets.REGISTRY_USERNAME }}/first-experiment-model \
            --set image.tag=${IMAGE_TAG} \
            --namespace dev \
            --create-namespace
        # Deploy the Docker Hub image to local Kubernetes using Helm

      - name: Rollout verification
        run: kubectl rollout status deployment/first-experiment -n dev --timeout=180s
        # Verify that the deployment rollout is completed successfully

      - name: Smoke test placeholder
        run: |
          kubectl get pods -n dev
          kubectl get svc -n dev
          echo "Endpoint smoke test will be added after service/ingress exposure is finalized"
        # Validate deployed Kubernetes resources after Helm deployment